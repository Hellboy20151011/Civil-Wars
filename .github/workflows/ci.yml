name: CI

# Läuft bei jedem Push auf main und bei jedem Pull Request
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Code auschecken
      - name: Code auschecken
        uses: actions/checkout@v4

      # 2. Node.js einrichten (Version 20, npm-Cache aktivieren)
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # 3. Abhängigkeiten installieren
      - name: Abhängigkeiten installieren
        run: npm ci
        working-directory: backend

      # 4. Lint und Tests ausführen – schlägt nicht fehl, wenn die Scripts fehlen
      - name: Lint (falls vorhanden)
        run: npm run lint --if-present
        working-directory: backend

      - name: Tests (falls vorhanden)
        run: npm test --if-present
        working-directory: backend
