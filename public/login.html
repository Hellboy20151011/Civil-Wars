<!DOCTYPE html>
<html lang="de">
<head>
  <!-- Login-Seite: Formular wird durch js/auth.js an den Endpoint /api/login angebunden -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>Login</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="E-Mail" required />
      <input type="password" id="passwort" placeholder="Passwort" required />
      <button type="submit">Einloggen</button>
    </form>

    <div class="message" id="message"></div>

    <p class="text-center">
      Noch kein Konto? <a href="/register.html">Jetzt registrieren</a>
    </p>
  </div>

  <script src="js/utils.js"></script>
  <!-- auth.js verbindet dieses Formular mit auth.routes -> auth.controller.login -->
  <script src="js/auth.js"></script>
</body>
</html>
