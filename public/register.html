<!DOCTYPE html>
<html lang="de">
<head>
  <!-- Registrierungsseite: Formular wird durch js/auth.js an den Endpoint /api/register angebunden -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrierung</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>Registrierung</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Spielername" required />
      <input type="email" id="email" placeholder="E-Mail" required />
      <input type="password" id="passwort" placeholder="Passwort" required />
      <button type="submit">Registrieren</button>
    </form>

    <div class="message" id="message"></div>

    <p class="text-center">
      Bereits registriert? <a href="/login.html">Zum Login</a>
    </p>
  </div>

  <script src="js/utils.js"></script>
  <!-- auth.js verbindet dieses Formular mit auth.routes -> auth.controller.register -->
  <script src="js/auth.js"></script>
</body>
</html>
